<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shorcut icon" href="favicon-formulario.ico" type="image/x-icon">
    <link rel="icon" href="formulario-icono.png" type="image/png" sizes="32x32">
    <title>Formulario de Reserva de Viaje</title>
    <link rel="stylesheet" href="Estilo-formulario.css">
    <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "BreadcrumbList",
          "itemListElement": [
          
        {
            "@type": "ListItem",
            "position": 1,
            "name": "Inicio",
            "item": "https://ivanrodriguezcuellar.github.io/"
        },

        {
            "@type": "ListItem",
            "position": 2,
            "name": "Formulario",
            "item": "https://ivanrodriguezcuellar.github.io/Formulario.html"
            }
          ]
        }
      </script>
</head>
<body>
    <a href="#contenido">Ir al contenido</a>
    <main id="contenido">
    <form action="#" method="post" enctype="multipart/form-data" novalidate autocomplete="off">
        <header>
            <h1>Reserva tu próximo viaje</h1>
        </header>

        <fieldset>
            <legend id="info">Información del viaje</legend>
            
            <label for="destino">Destino:</label>
            <input type="text" id="destino" name="destino" placeholder="Ej: Japón, Francia, Italia, Noruega, Alemania" required aria-required="true">
            
            <label for="fecha_ida">Fecha de ida:</label>
            <input type="date" id="fecha_ida" name="fecha_ida" required aria-required="true">
            
            <label for="fecha_regreso">Fecha de vuelta:</label>
            <input type="date" id="fecha_regreso" name="fecha_regreso">
            
            <label for="adultos">Adultos:</label>
            <input type="number" id="adultos" name="adultos" min="1" value="1" required aria-required="true">
            
            <label for="ninos">Niños:</label>
            <input type="number" id="ninos" name="ninos" min="0" value="0">

            <label for="transporte">Medio de transporte preferido:</label>
            <select id="transporte" name="transporte">
                <option value="avion">Avión</option>
                <option value="tren">Tren</option>
                <option value="autobus">Autobús</option>
                <option value="coche">Coche</option>
            </select>

            <label for="clase">Clase de viaje:</label>
        <select id="clase" name="clase">
            <option value="economica">Económica</option>
            <option value="premium">Premium</option>
            <option value="business">Business</option>
            <option value="primera">Primera clase</option>
        </select>

            <label for="idiomas">Idiomas:</label>
            <select id="idiomas" name="idiomas">
                <option value="español">Español</option>
                <option value="ingles">Íngles</option>
                <option value="frances">Francés</option>
                <option value="aleman">Alemán</option>
                <option value="otros">Otros</option>
            </select>

            <label for="pais">País de residencia:</label>
            <input type="text" id="pais" name="pais" required aria-required="true" placeholder="Ej: España, Estados Unidos, Argentina">

        </fieldset>
        
            <fieldset>
                <legend id="viaje">Actividades</legend>

            <label for="actividad">Actividades que te interesan:</label>
            <select id="actividad" name="actividad" size="3" multiple>
                <option value="cultura">Cultura</option>
                <option value="aventura" selected>Aventura</option>
                <option value="relax">Relax</option>
                <option value="gastronomia">Gastronomia</option>
                <option value="otro">Otras</option>
            </select>

            <label for="hotel">Hotel:</label>
            <select id="hotel" name="hotel" multiple size="3">
                <option value="desayuno">Desayuno</option>
                <option value="comida">Comida</option>
                <option value="merienda">Merienda</option>
                <option value="cena">Cena</option>
            </select>

            <label for="habitacion">Tipo de habitación:</label>
            <select id="habitacion" name="habitacion" size="3">
                <option value="individual">Individual</option>
                <option value="doble">Doble</option>
                <option value="suite">Suite</option>
            </select>

            <label for="tiene_alergia">Alergias:</label>
            <select id="tiene_alergia" name="alergias" required aria-required="true">
            <option value="Si">SI</option>
            <option value="No" selected>NO</option>
            </select>

            <label for="detalle_alergia">Especificar alguna alergia en caso de tener alguna:</label>
            <textarea id="detalle_alergia" name="alergia" placeholder="Indicar cualquier tipo de alergia..."></textarea>

            </fieldset>

        <fieldset>
            <legend id="datos">Datos de contacto</legend>

            <label for="nombre_completo">Nombre completo:</label>
            <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Introduce tu nombre y apellidos completos" required aria-required="true">
            
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" placeholder="Por ejemplo usuario@dominio.es" required aria-required="true">
            
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="612345678" required aria-required="true">

            <label for="contacto">Método de contacto preferido:</label>
            <select id="contacto" name="contacto">
                <option value="email">Correo electrónico</option>
                <option value="telefono">Teléfono</option>
                <option value="whatsapp">WhatsApp</option>
            </select>

            <label for="archivo">Adjuntar reserva del hotel:</label>
            <input type="file" id="archivo" name="archivo">

            </fieldset>

            <fieldset>
                <legend id="pagos">Datos de pago</legend>

            <label for="pago">Forma de pago:</label>
            <select id="pago" name="pago">
                <option value="tarjeta">Tarjeta de crédito/débito</option>
                <option value="paypal">PayPal</option>
                <option value="transferencia">Transferencia bancaria</option>
            </select>

            <label for="nombre">Nombre en la tarjeta:</label>
            <input type="text" id="nombre" name="nombre" required aria-required="true" placeholder="Ejemplo: Victor García">

            <label for="tarjeta">Número de tarjeta:</label>
            <input type="text" id="tarjeta" name="tarjeta" maxlength="16" required aria-required="true" placeholder="1234 5678 9012 3456">

            <label for="caducidad">Fecha de caducidad:</label>
            <input type="month" id="caducidad" name="caducidad" required aria-required="true" placeholder="MM/AAAA">

            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" name="cvv" maxlength="4" required aria-required="true" placeholder="123">

                        
            <label for="comentarios">Comentarios adicionales:</label>
            <textarea id="comentarios" name="comentarios" placeholder="Indica cualquier necesidad especial o pregunta"></textarea>
        </fieldset>

        
        <fieldset>
            <legend>Aceptación de condiciones</legend>
            <input type="checkbox" id="terminos" name="terminos" required aria-required="true">
            <label for="terminos">Acepto los términos y condiciones</label>
        </fieldset>
        


        <button type="submit">Reservar viaje</button>
        <button type="reset">Limpiar formulario</button>
        
    </form>
    </main>
</body>
</html>
