<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media query</title>
    <link rel="stylesheet" href="" media="max-width:1024px">
    <link rel="stylesheet" href="" media="max-width: 720px">
    <style>
        @import url("estilo") only screen and (max-width:1024px);

        p{
            font-size: 20px;
            font-weight: bold;
        }

        /* @media (601px >= width <= 1000px){
            p{
                color: forestgreen;
            }

            span{
                font-style: italic;
            }
        }

        @media screen and (max-width:600px){
            p{
                color: cadetblue;
            }

            span{
                text-decoration: underline;
            }
        } 
        */

        /* OR es una coma (,)*/
        @media screen and (max-width:704px), screen and
        (orientation: portrait){
            p{
                color: gold;
            }
        }
    </style>
</head>
<body>
    <p>Hola, <span>mundo</span></p>
    <picture>
        <source srcset="apolo1.jfif" type="image/svg-xml" media="(min:width:10px) and (max-width:649px)"> <!-- Prioridad 1: SVG (máxima calidad, poco peso) -->
        <source srcset="imagen.png" type="image/png" media="(min-width:659px) and (max-width:1000px)"> <!-- Prioridad 2: PNG (si el navegador no soporta SVG) -->
        <img src="Imagen Grandes" alt="Imagen" width="100%"> <!-- Fallback obligatorio: Se muestra si falla todo lo anterior -->
    </picture>

    
</body>
</html>
